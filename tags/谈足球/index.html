<script>
(function() {
  'use strict';

  
  var el = document.getElementById('heatmap');
  if (!el) return;

  
  var rawData = JSON.parse(document.getElementById('heatmap-data').textContent);
  if (!rawData.length) { el.style.display = 'none'; return; }

  
  
  
  function getISOWeekInfo(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - day);
    var yrStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return {
      year: d.getUTCFullYear(),
      week: Math.ceil((((d - yrStart) / 86400000) + 1) / 7)
    };
  }

  
  
  
  var agg = {};
  rawData.forEach(function(d) {
    var info = getISOWeekInfo(new Date(d[0]));
    var key = info.year + '-' + info.week;
    if (!agg[key]) agg[key] = { year: info.year, week: info.week, count: 0, articles: 0 };
    agg[key].count += d[1];
    agg[key].articles += d[2];
  });

  
  
  
  var cur = getISOWeekInfo(new Date());
  var showYears =  3 ;
  var minYear = cur.year - (showYears - 1);
  var maxYear = cur.year;

  var filteredAgg = {};
  Object.keys(agg).forEach(function(k) {
    if (agg[k].year >= minYear && agg[k].year <= maxYear) {
      filteredAgg[k] = agg[k];
    }
  });
  if (Object.keys(filteredAgg).length === 0) { el.style.display = 'none'; return; }

  
  
  
  var yData = [];
  for (var y = minYear; y <= maxYear; y++) yData.push(y);

  var xData = [];
  for (var w = 1; w <= 53; w++) xData.push(w);

  
  
  
  var cellMeta = []; 
  var gridValues = [];
  for (var yi = 0; yi < yData.length; yi++) {
    for (var wi = 0; wi < xData.length; wi++) {
      var year = yData[yi], week = xData[wi];
      var item = filteredAgg[year + '-' + week];
      var isFuture = (year === cur.year && week > cur.week);
      var state, count = 0, articles = 0;
      if (item) {
        state = isFuture ? -1 : 1;
        count = item.count;
        articles = item.articles;
      } else {
        state = isFuture ? -1 : 0;
      }
      gridValues.push([wi, yi, state]);
      cellMeta.push({ count: count, articles: articles, year: year, week: week });
    }
  }
  if (gridValues.length === 0) { el.style.display = 'none'; return; }

  
  
  
  var root = document.documentElement;
  function refetchCSS() {
    var s = getComputedStyle(root);
    function cv(n) { return s.getPropertyValue(n).trim(); }
    function cn(n) { return parseInt(cv(n), 10) || 0; }
    return {
      
      bodyBg:      cv('--heatmap-bg'),
      gridTop:    cn('--heatmap-grid-top'),
      gridBottom: cn('--heatmap-grid-bottom'),
      gridLeft:   cn('--heatmap-grid-left'),
      gridRight:  cn('--heatmap-grid-right'),

      
      rowGap:     cn('--heatmap-row-gap'),
      cellBorder: cn('--heatmap-cell-border'),

      
      axisSize:   cn('--heatmap-axis-size'),
      axisWeight: cv('--heatmap-axis-weight'),
      axisFamily: cv('--heatmap-axis-family') || 'Consolas, monospace',

      
      axisColor:   cv('--heatmap-axis-color'),
      activeColor: cv('--heatmap-active-color'),
      emptyCell:   cv('--heatmap-empty-cell'),
      futureCell:  cv('--heatmap-future-cell'),

      tipBg:    cv('--heatmap-tip-bg'),
      tipColor: cv('--heatmap-tip-color'),

      
      cellRadius: cn('--heatmap-cell-radius')
    };
  }

  
  
  
  function computeContainerSize(css) {
    var cellSize = Math.max(6, (el.offsetWidth - css.gridLeft - css.gridRight) / 53);
    el.style.height = Math.round(cellSize * yData.length + css.gridTop + css.gridBottom) + 'px';
  }

  
  
  
  function buildOption(css) {
    
    var coloredData = gridValues.map(function(d) {
      var color;
      if (d[2] === 1)       color = css.activeColor;
      else if (d[2] === 0)  color = css.emptyCell;
      else                   color = css.futureCell; 
      return {
        value: d,
        itemStyle: { color: color }
      };
    });

    return {
      tooltip: {
        backgroundColor: css.tipBg,
        borderColor: css.tipBg,
        textStyle: { color: css.tipColor, fontSize: 13 },
        formatter: function(params) {
          var val = params.value[2];
          if (val <= 0) return '';
          var meta = cellMeta[params.dataIndex];
          return meta.year + ' Week ' + meta.week + '<br/>'
            + meta.articles + ' 篇文章，共 ' + meta.count.toLocaleString() + ' 字';
        }
      },
      grid: {
        top: css.gridTop,
        bottom: css.gridBottom,
        left: css.gridLeft,
        right: css.gridRight,
        containLabel: false
      },
      xAxis: {
        type: 'category',
        data: xData,
        splitLine: { show: false },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          show: true,
          interval: 4,
          fontSize: css.axisSize,
          fontFamily: css.axisFamily,
          color: css.axisColor,
          fontWeight: css.axisWeight,
          formatter: function(v) { return 'W' + v; }
        }
      },
      yAxis: {
        type: 'category',
        data: yData,
        splitLine: {
          show: css.rowGap > 0,
          lineStyle: { width: css.rowGap, color: css.bodyBg }
        },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: {
          interval: 0,
          fontSize: css.axisSize,
          fontFamily: css.axisFamily,
          color: css.axisColor,
          fontWeight: css.axisWeight
        }
      },
      series: [{
        type: 'heatmap',
        coordinateSystem: 'cartesian2d',
        data: coloredData,
        progressive: 0,
        label: { show: false },
        itemStyle: {
          borderWidth: css.cellBorder,
          borderColor: css.bodyBg,
          borderRadius: css.cellRadius
        },
        emphasis: {
          itemStyle: {
            borderWidth: Math.max(1, css.cellBorder + 1),
            borderColor: css.bodyBg,
            shadowBlur: 4,
            shadowColor: 'rgba(0,0,0,0.15)'
          }
        }
      }]
    };
  }

  
  
  
  var css = refetchCSS();
  el.style.background = css.bodyBg;
  computeContainerSize(css);

  try {
    var chart = echarts.init(el);
    chart.setOption(buildOption(css));
    window.addEventListener('resize', function() { chart.resize(); });
  } catch(e) {
    console.error('[Heatmap]', e);
    return;
  }

  
  
  
  var observer = new MutationObserver(function() {
    css = refetchCSS();
    el.style.background = css.bodyBg;
    computeContainerSize(css);
    chart.setOption(buildOption(css));
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();
</script>

  const searchResults = document.getElementById('searchResults');
  const archiveList = document.getElementById('archiveList');

  let fuse;
  let dataLoaded = false;

  async function loadData() {
    const response = await fetch('/index.json');
    const data = await response.json();
    fuse = new Fuse(data, {
      keys: ['title', 'content'],
      threshold: 0.3
    });
    dataLoaded = true;
  }

  searchInput.addEventListener('input', async function () {
    const query = this.value.trim();
    if (!dataLoaded) await loadData();

    if (query === '') {
      searchResults.innerHTML = '';
      archiveList.style.display = 'block';
      return;
    }

    const result = fuse.search(query);
    archiveList.style.display = 'none';
    searchResults.innerHTML = '';

    if (result.length === 0) {
      searchResults.innerHTML = '<li>未找到相关结果</li>';
    } else {
      result.forEach(({ item }) => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${item.url}">${item.title}</a>`;
        li.style.marginBottom = '0.5rem';
        searchResults.appendChild(li);
      });
    }
  });
